---
name: footer-bucky-badge
description: Reusable footer "Partnered with Bucky" badge — inherits surrounding styles
version: 1.1.0
---

<!--
  ============================================
  FOOTER — BUCKY SOLUTIONS PARTNER BADGE
  ============================================
  
  The badge inherits its color from the footer so it always matches
  the surroundings. The entire row (text + logo) is one clickable link.
  Font is Host Grotesk with fallbacks.
  
  Logo: https://assets.buckysolutions.com/bucky%2Blogo%2Bwhite.svg
  
  Usage: Place the HTML inside the footer copyright row's right column
  (the .fl-rich-text div), and add the CSS to the site's <style> block.
-->

<!-- HTML -->
<div class="footer-bucky-badge">
	<a href="https://buckysolutions.com" target="_blank" rel="noopener" title="Bucky Solutions">
		<span>Partnered with</span>
		<img src="https://assets.buckysolutions.com/bucky%2Blogo%2Bwhite.svg" alt="Bucky Solutions" width="90" height="18" loading="lazy">
	</a>
</div>

<!-- CSS -->
<style>
.footer-bucky-badge { display: flex; align-items: center; justify-content: center; width: 100%; }
.footer-bucky-badge a { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; font-family: 'Host Grotesk', 'Inter', system-ui, sans-serif; font-size: 13px; transition: color .2s, opacity .2s; }
.footer-bucky-badge a:hover { color: inherit; opacity: 0.8; }
.footer-bucky-badge a img { display: block; height: 18px; width: auto; }
</style>
